<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Document Analytics{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="d-flex" style="min-height: 100vh;">
    <nav class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark" style="width: 240px;">
      <a href="{% url 'dashboard' %}" class="d-flex align-items-center mb-3 text-white text-decoration-none fs-5">
        <i class="bi bi-file-earmark-bar-graph me-2"></i>
        <span class="fw-semibold">DocAnalytics</span>
      </a>
      <hr>
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="{% url 'dashboard' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" aria-current="page">
            <i class="bi bi-grid me-2"></i>
            Dashboard
          </a>
        </li>
        <li>
          <a href="{% url 'admin:index' %}" class="nav-link text-white">
            <i class="bi bi-gear me-2"></i>
            Admin
          </a>
        </li>
      </ul>
      <hr>
      <div class="text-secondary small px-2">
        <i class="bi bi-database me-1"></i> MongoDB
      </div>
    </nav>

    <main class="flex-grow-1 p-4 bg-body-tertiary overflow-auto">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
