services:
  mongodb:
    image: mongo:7
    container_name: docanalytics_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: document_analytics_db
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 10s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: docanalytics_app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000"

volumes:
  mongo_data:
